# Two services: Static Site (Next.js client) + Web Service (Express API)
services:
  # ── Express API ──
  - type: web
    name: project-e2e-coral-api
    runtime: node
    rootDir: server
    buildCommand: npm install --production=false && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false # set in Render dashboard

  # ── Next.js static site ──
  - type: static
    name: project-e2e-coral-client
    rootDir: client
    buildCommand: npm install; npm run build
    publishPath: ./out
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      # SPA fallback: any path that doesn't match a static file → index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # set in Render dashboard (e.g. https://project-e2e-coral-api.onrender.com)
