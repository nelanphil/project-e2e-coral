# Two services: Static Site (Next.js client) + Web Service (Express API)
services:
  # ── Express API ──
  - type: web
    name: project-e2e-coral-api
    runtime: node
    rootDir: server
    buildCommand: npm install --production=false && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false # set in Render dashboard, e.g. https://cfcorals.com,https://www.cfcorals.com

  # ── Next.js web service ──
  - type: web
    name: project-e2e-coral-client
    runtime: node
    rootDir: client
    buildCommand: npm install; npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false # set in Render dashboard (e.g. https://project-e2e-coral-api.onrender.com)
      - key: NEXT_PUBLIC_SITE_URL
        sync: false # set in Render dashboard (e.g. https://project-e2e-coral-client.onrender.com)
